{% load static %}

<nav id="floating-nav"
     class="fixed left-4 top-1/2 -translate-y-1/2 z-40 hidden lg:flex flex-col gap-3
            opacity-0 transition-opacity duration-500 pointer-events-none"
     aria-label="Quick navigation">

    <!-- Home -->
    <a href="{% url 'home' %}"
       class="group relative w-10 h-10 flex items-center justify-center rounded-xl
              backdrop-blur-sm transition-all duration-300
              {% if request.path == '/' %}bg-blue-600 border border-blue-500{% else %}bg-gray-900/80 border border-gray-800 hover:border-sky-500/50 hover:bg-gray-800/80{% endif %}"
       aria-label="Home">
        <svg class="w-4 h-4 transition {% if request.path == '/' %}text-white{% else %}text-gray-400 group-hover:text-sky-400{% endif %}"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="absolute left-full ml-3 px-2 py-1 text-xs rounded-md bg-gray-800 text-gray-300
                     border border-gray-700 opacity-0 group-hover:opacity-100 transition pointer-events-none whitespace-nowrap">
            Home
        </span>
    </a>

    <!-- Blog -->
    <a href="{% url 'blog' %}"
       class="group relative w-10 h-10 flex items-center justify-center rounded-xl
              backdrop-blur-sm transition-all duration-300
              {% if request.path == '/blog/' %}bg-blue-600 border border-blue-500{% else %}bg-gray-900/80 border border-gray-800 hover:border-sky-500/50 hover:bg-gray-800/80{% endif %}"
       aria-label="Blog">
        <svg class="w-4 h-4 transition {% if request.path == '/blog/' %}text-white{% else %}text-gray-400 group-hover:text-sky-400{% endif %}"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
        </svg>
        <span class="absolute left-full ml-3 px-2 py-1 text-xs rounded-md bg-gray-800 text-gray-300
                     border border-gray-700 opacity-0 group-hover:opacity-100 transition pointer-events-none whitespace-nowrap">
            Blog
        </span>
    </a>

    <!-- Contact -->
    <a href="{% url 'contact' %}"
       class="group relative w-10 h-10 flex items-center justify-center rounded-xl
              backdrop-blur-sm transition-all duration-300
              {% if request.path == '/contact/' %}bg-blue-600 border border-blue-500{% else %}bg-gray-900/80 border border-gray-800 hover:border-sky-500/50 hover:bg-gray-800/80{% endif %}"
       aria-label="Contact">
        <svg class="w-4 h-4 transition {% if request.path == '/contact/' %}text-white{% else %}text-gray-400 group-hover:text-sky-400{% endif %}"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <span class="absolute left-full ml-3 px-2 py-1 text-xs rounded-md bg-gray-800 text-gray-300
                     border border-gray-700 opacity-0 group-hover:opacity-100 transition pointer-events-none whitespace-nowrap">
            Contact
        </span>
    </a>

</nav>

<script>
(function() {
    const nav = document.getElementById("floating-nav");
    if (!nav) return;

    function check() {
        const header = document.querySelector("header");
        const threshold = header ? header.offsetHeight + 100 : 150;

        if (window.scrollY > threshold) {
            nav.classList.remove("opacity-0", "pointer-events-none");
            nav.classList.add("opacity-100");
        } else {
            nav.classList.add("opacity-0", "pointer-events-none");
            nav.classList.remove("opacity-100");
        }
    }

    window.addEventListener("scroll", check, { passive: true });
    check();
})();
</script>
