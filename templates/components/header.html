<header class="border-b border-gray-800/50 relative z-50">
    <div class="max-w-7xl mx-auto px-6 py-2 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <!-- Logo -->
            <a href="{% url 'home' %}" class="text-xl font-semibold">
            Fatima.dev<span class="text-sky-500">_</span>
            </a>

            <!-- Desktop Navigation -->
            <nav class="hidden md:flex items-center gap-8">
                <a href="{% url 'home' %}"
                class="relative transition
                {% if request.path == '/' %}text-sky-400{% else %}hover:text-sky-400{% endif %}">
                 Home
                 {% if request.path == '/' %}
                 <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-sky-400 rounded-full animate-pulse"></span>
                 {% endif %}
                </a>

                <a href="{% url 'blog' %}"
                    class="relative transition
                    {% if request.path == '/blog/' %}text-sky-400{% else %}hover:text-sky-400{% endif %}">
                    Blog
                    {% if request.path == '/blog/' %}
                    <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-sky-400 rounded-full animate-pulse"></span>
                    {% endif %}
                </a>

                <a href="{% url 'contact' %}"
                    class="relative transition
                    {% if request.path == '/contact/' %}text-sky-400{% else %}hover:text-sky-400{% endif %}">
                    Contact
                    {% if request.path == '/contact/' %}
                    <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-sky-400 rounded-full animate-pulse"></span>
                    {% endif %}
                </a>
            </nav>

            <!-- Actions -->
            <div class="flex items-center gap-3">

                <!-- GitHub -->
                <a
                    href="https://github.com/fatiimahoseini"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="p-2 rounded-xl hover:bg-gray-800 transition"
                    aria-label="GitHub"
                >
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 .5C5.65.5.5 5.65.5 12a11.5 11.5 0 008 10.94c.58.11.79-.25.79-.56v-2.17c-3.26.71-3.95-1.39-3.95-1.39-.53-1.35-1.3-1.71-1.3-1.71-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.78 2.73 1.27 3.4.97.1-.75.41-1.27.74-1.56-2.6-.29-5.34-1.3-5.34-5.79 0-1.28.46-2.32 1.2-3.14-.12-.3-.52-1.48.11-3.09 0 0 .98-.31 3.2 1.2a11.2 11.2 0 015.82 0c2.22-1.51 3.2-1.2 3.2-1.2.63 1.61.23 2.79.11 3.09.75.82 1.2 1.86 1.2 3.14 0 4.5-2.74 5.49-5.35 5.78.42.37.79 1.09.79 2.2v3.26c0 .31.21.68.8.56A11.5 11.5 0 0023.5 12C23.5 5.65 18.35.5 12 .5z"/>
                    </svg>
                </a>

                <!-- Light Mode Toggle (sun icon — site is dark) -->
                <button
                    id="theme-toggle"
                    class="p-2 rounded-xl hover:bg-gray-800 transition"
                    aria-label="Toggle Theme"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                </button>

                <!-- Mobile Hamburger -->
                <button
                    id="mobile-menu-btn"
                    class="md:hidden p-2 rounded-xl hover:bg-gray-800 transition"
                    aria-label="Menu"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path id="hamburger-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 6h16M4 12h16M4 18h16"/>
                        <path id="close-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M6 18L18 6M6 6l12 12" class="hidden"/>
                    </svg>
                </button>

            </div>

        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-gray-800/50">
        <div class="px-6 py-4 space-y-3">
            <a href="{% url 'home' %}"
               class="block py-2 transition {% if request.path == '/' %}text-sky-400{% else %}text-gray-300 hover:text-sky-400{% endif %}">
                Home
            </a>
            <a href="{% url 'blog' %}"
               class="block py-2 transition {% if request.path == '/blog/' %}text-sky-400{% else %}text-gray-300 hover:text-sky-400{% endif %}">
                Blog
            </a>
            <a href="{% url 'contact' %}"
               class="block py-2 transition {% if request.path == '/contact/' %}text-sky-400{% else %}text-gray-300 hover:text-sky-400{% endif %}">
                Contact
            </a>
        </div>
    </div>
</header>

<script>
(function() {
    const btn = document.getElementById("mobile-menu-btn");
    const menu = document.getElementById("mobile-menu");
    const hamburger = document.getElementById("hamburger-icon");
    const close = document.getElementById("close-icon");
    if (!btn) return;

    btn.addEventListener("click", () => {
        const open = !menu.classList.contains("hidden");
        menu.classList.toggle("hidden");
        hamburger.classList.toggle("hidden");
        close.classList.toggle("hidden");
    });
})();
</script>
