{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portfolio{% endblock %}</title>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Inter', 'sans-serif'],
                mono: ['JetBrains Mono', 'monospace'],
              }
            }
          }
        }
    </script>
</head>

<body class="bg-gray-950 text-white font-sans antialiased min-h-screen flex flex-col">
  
<!-- Navbar -->
<nav class="flex justify-between p-6 border-b border-gray-800">
    <div class="font-bold">fatima.dev</div>

    <div class="space-x-6">
        <!-- <a href="/">Home</a> -->
        <a href="/projects/">Projects</a>
        <a href="/blog/">Blog</a>
        <a href="/contact/">Contact</a>
    </div>
</nav>

<!-- Content -->
<main class="flex-1 max-w-5xl mx-auto px-6 py-6 flex flex-col justify-center">
    {% block content %}
    {% endblock %}
</main>

<!-- Footer -->
<footer class="p-6 border-t border-gray-800/70">
  <div class="flex items-center justify-between">

      <!-- left -->
      <p class="text-xs text-gray-500 font-mono">
          © 2026 Fatima Hosseini — All right reserved.
      </p>

      <!-- right -->
      <div class="flex items-center gap-4 text-gray-500">

          <!-- github -->
          <a href="https://github.com/fatiimahoseini" class="hover:text-sky-400 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor"
                   viewBox="0 0 24 24" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 19c-4.3 1.4-4.3-2.5-6-3m12
                           6v-3.5c0-1 .1-1.4-.5-2
                           2.8-.3 5.5-1.4 5.5-6.5
                           0-1.5-.5-2.7-1.5-3.7
                           .2-.4 .7-1.8-.1-3.8
                           0 0-1.2-.4-3.9 1.5
                           -1.1-.3-2.3-.5-3.5-.5
                           s-2.4.2-3.5.5C4.8 2.3
                           3.6 2.7 3.6 2.7c-.8 2-.3
                           3.4-.1 3.8-1 1-1.5 2.2-1.5
                           3.7 0 5.1 2.7 6.2 5.5 6.5
                           -.6.6-.6 1.2-.6 2V22"/>
              </svg>
          </a>

          <!-- linkedin -->
          <a href="https://www.linkedin.com/in/fatiimahoseini/" class="hover:text-sky-400 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor"
                   viewBox="0 0 24 24" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4V9h4v2"/>
                  <rect x="2" y="9" width="4" height="12" rx="1"/>
                  <circle cx="4" cy="4" r="2"/>
              </svg>
          </a>

      </div>

  </div>
</footer>

</body>
</html>
